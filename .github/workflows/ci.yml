name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# PR サマリへの書き込みに必要
permissions:
  contents: read
  pull-requests: write

jobs:
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest

    steps:
      # ─── セットアップ ───────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ─── ユニットテスト + カバレッジ ─────────
      - name: Run unit tests with coverage
        run: pnpm coverage

      # ─── カバレッジレポートを PR サマリに表示 ──
      - name: Report backend coverage
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: "Backend"
          json-summary-path: packages/backend/coverage/coverage-summary.json
          json-final-path: packages/backend/coverage/coverage-final.json
          vite-config-path: packages/backend/vitest.config.ts

      - name: Report frontend coverage
        if: always() && github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          name: "Frontend"
          json-summary-path: packages/frontend/coverage/coverage-summary.json
          json-final-path: packages/frontend/coverage/coverage-final.json
          vite-config-path: packages/frontend/vitest.config.ts

      # ─── Playwright キャッシュ ─────────────────
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(cd e2e && npx playwright --version)" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd e2e && npx playwright install --with-deps chromium

      - name: Install Playwright OS dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd e2e && npx playwright install-deps chromium

      # ─── Playwright API テスト ───────────────
      - name: Run Playwright API tests
        run: cd e2e && npx playwright test --project=api
        env:
          CI: true

      # ─── テスト結果のアーティファクト保存 ─────
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
